<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <h1 class="h1"> Apply For Job Application </h1>
    
    <form action="Thanks.html">
        
    <!-- Personal -->
    
    <h3 class="h3" id="pi">Personal Information</h3>

    <div class="personal">

        <label class="fname">First name:</label>
        <input type="text" id="fname">

        <label class="mname">Mid name:</label>
        <input type="text" id="mname">

        <label class="lname">Last name:</label>
        <input type="text" id="lname">

        <br>

        <label class="phone">Phone No :</label>
        <input type="number" id="phone" maxlength="10">

        <br>

        <label class="email">E-Mail :</label>
        <input type="text" id="email" required>

        <br>

        <label class="add">Address :</label>
        <input type="text" id="address" >

        <br>

        <label class="city">City :</label>
        <input type="text" id="city">

        <label class="state">State :</label>
        <input type="text" id="state">

        <label class="pin">Pin :</label>
        <input type="number" id="pin" maxlength="6">

    </div>

    <!-- Education -->

    <h3 class="h3" id="ei">Education Information</h3>

    <div class="education">

        <label class="sname">School Name :</label>
        <input type="text" id="sname">

        <br>

        <label class="s_from">From :</label>
        <input type="date" id="s_from">

        <label class="s_to">To :</label>
        <input type="date" id="s_to">

        <br>

        <label class="cname">College Name :</label>
        <input type="text" id="cname">

        <br>

        <label class="c_from"> From :</label>
        <input type="date" id="c_from">

        <label class="c_to">To :</label>
        <input type="date" id="c_to">

        <br>

        <label class="subject">Subjects:-</label>        
        <ul>
            <li>Python</li>
            <li>C Language</li>
            <li>Frontend Engineering</li>
            <li>Backend Engineering</li>
            <li>c++</li>
            <li>Java</li>
            <li>Data Structers & algorithm</li>
            <li>Data Science</li>
        </ul>

    </div>

    <!-- Profession -->

    <h3 class="h3" id="pI">Professional Information</h3>

    <div class="professional">

        <label class="company">Company :</label>
        <input type="text" id="cp_name">

        <br>

        <label class="cp_from"> From :</label>
        <input type="date" id="cp_from">

        <label class="cp_to">To :</label>
        <input type="date" id="cp_to">

        <br>

        <label class="work">Work Information :</label>
        <textarea name="Work Information" id="work" cols="100" rows="10" ></textarea>

    </div>

    <div class="btn">

        <input type="submit" class="apply">
        <input type="reset" class="reset">

    </div>

    </form>

    <img src="image/" alt="Contact us" class="cont">
    
</body>
</html>
